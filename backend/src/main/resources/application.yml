server:
  port: 8080

spring:
  application:
    name: web-insight-ai

  datasource:
    url: jdbc:mysql://localhost:3306/web_insight_ai?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: liaoda123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

ai:
  encryption:
    key: WebInsightAI2024SecretKey32B!

  ollama:
    url: http://localhost:11434
    default-model: qwen3.5:2b
    timeout: 120

  providers:
    openai:
      url: https://api.openai.com/v1
      model: gpt-4o-mini
    deepseek:
      url: https://api.deepseek.com/v1
      model: deepseek-chat
    qwen:
      url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-plus
    siliconflow:
      url: https://api.siliconflow.cn/v1
      model: Qwen/Qwen2.5-7B-Instruct

cache:
  caffeine:
    max-size: 1000
    expire-after-write: 24h